<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LuxeGram</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="dark-mode">

    <div id="auth-screen" class="auth-full-screen">
        <div class="auth-card">
            <h1>LuxeGram</h1>
            <input type="text" id="reg-nickname" placeholder="Ваше имя (Ник)..."><br><br>
            <input type="text" id="reg-username" placeholder="Username (@user)..."><br><br>
            <button onclick="register()">Войти</button>
        </div>
    </div>

    <div id="side-menu" class="side-menu">
        <div class="menu-header">
            <img id="menu-avatar" style="width:60px; border-radius:50%;">
            <div id="menu-nick" style="font-weight:bold; margin-top:10px;"></div>
            <div id="menu-user" style="opacity:0.6; font-size:14px;"></div>
        </div>
        <hr>
        <div class="menu-item" onclick="showFolder('all'); toggleMenu()">📱 Все чаты</div>
        <div class="menu-item" onclick="showFolder('archive'); toggleMenu()">📦 Архив</div>
        <div class="menu-item" onclick="openSettings(); toggleMenu()">⚙️ Настройки</div>
    </div>
    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <span onclick="toggleMenu()" style="cursor:pointer; font-size:24px;">☰</span>
                <input type="text" id="searchUser" placeholder="Поиск..." onkeydown="if(event.key==='Enter') searchProfile()">
            </div>
            <div id="chat-list"></div>
        </div>

        <div class="chat-window">
            <div class="chat-header" id="chatHeader" onclick="showUserProfile(activeChat)">
                <h3 id="current-chat-title">Выберите чат</h3>
            </div>
            <div id="messages" class="messages-area"></div>
            <div class="input-panel" id="inputPanel" style="display:none;">
                <input type="text" id="msgInput" placeholder="Написать..." onkeydown="if(event.key==='Enter') send()">
                <button onclick="send()">➤</button>
            </div>
        </div>

        <div id="user-profile-panel" class="right-panel">
            <div class="profile-content">
                <button onclick="closeRightPanel()">✕</button>
                <img id="profile-img" class="profile-big-img">
                <h2 id="profile-nick"></h2>
                <p id="profile-user"></p>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>Настройки</h2>
            <button onclick="toggleTheme()">Светлая/Темная тема</button><br><br>
            <input type="text" id="edit-nick" placeholder="Новый Ник">
            <button onclick="updateProfile('nick')">Ок</button><br><br>
            <input type="text" id="edit-user" placeholder="Новый @user">
            <button onclick="updateProfile('user')">Ок</button><br><br>
            <button onclick="closeSettings()">Закрыть</button>
        </div>
    </div>

    <div id="chat-context-menu" class="context-menu" style="display:none; position:fixed; background:#222; border:1px solid #444; z-index:5000;">
        <div class="menu-item" id="pin-opt" onclick="togglePin()" style="padding:10px; cursor:pointer;">Закрепить</div>
        <div class="menu-item" onclick="toggleArchive()" style="padding:10px; cursor:pointer;">В архив</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
