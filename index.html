<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeGram</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <!-- Экран авторизации (Поверх всего) -->
    <div id="auth-screen" class="auth-full-screen">
        <div class="auth-card">
            <h1>LuxeGram</h1>
            <input type="text" id="reg-name" placeholder="Введите ник (без @)...">
            <button onclick="register()">Войти</button>
        </div>
    </div>

    <!-- Выезжающее боковое меню -->
    <div id="side-menu" class="side-menu">
        <div class="menu-header">
            <img id="menu-avatar" class="large-avatar" src="">
            <div id="menu-user-name" class="menu-username" onclick="editProfile()"></div>
        </div>
        <div class="menu-content">
            <div class="menu-item" onclick="selectChat('Заметки')">🔖 Saved Messages</div>
            <div class="menu-item" onclick="editProfile()">⚙️ Настройки</div>
            <hr style="border: 0.5px solid #222;">
            <div class="menu-item">👛 Wallet</div>
        </div>
    </div>
    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <!-- Основной интерфейс приложения -->
    <div class="app-container">
        <!-- Левая панель: Список чатов -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="menu-toggle" onclick="toggleMenu()">☰</div>
                <input type="text" id="searchUser" placeholder="Поиск..." onkeydown="if(event.key==='Enter') searchProfile()">
            </div>
            <div id="chat-list" class="chat-list"></div>
        </div>

        <!-- Правая панель: Окно чата -->
        <div class="chat-window">
            <div class="chat-header">
                <div class="header-info">
                    <h3 id="current-chat-title">Выберите чат</h3>
                    <div id="typing-indicator" class="typing-text"></div>
                </div>
            </div>
            <div id="messages" class="messages-area"></div>
            
            <!-- Панель ввода (скрыта, пока чат не выбран) -->
            <div class="input-panel" id="inputPanel">
                <input type="text" id="msgInput" placeholder="Написать сообщение..." oninput="handleTyping()" onkeydown="if(event.key==='Enter') send()">
                <button onclick="send()" class="send-btn">➤</button>
            </div>
        </div>
    </div>

    <!-- Модалка для обсуждений под постами -->
    <div id="comments-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="comment-post-title">Обсуждение</span>
                <button onclick="closeComments()" class="close-btn">✕</button>
            </div>
            <div id="comment-messages" class="messages-area small"></div>
            <div class="input-panel">
                <input type="text" id="commentInput" placeholder="Ваш комментарий..." onkeydown="if(event.key==='Enter') sendComment()">
                <button onclick="sendComment()">➤</button>
            </div>
        </div>
    </div>

    <!-- Контекстное меню (ПКМ) -->
    <div id="msg-menu" class="context-menu">
        <div class="menu-item" onclick="editMsg()">✏️ Изменить</div>
        <div class="menu-item delete" onclick="deleteMsg()">🗑️ Удалить</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
