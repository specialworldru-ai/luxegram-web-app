<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxegram Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal">
        <div class="auth-box">
            <h2>Luxegram</h2>
            <input type="text" id="reg-name" placeholder="Ваш ник...">
            <button onclick="register()">Войти</button>
        </div>
    </div>

    <div id="profile-modal" class="modal" style="display: none;">
        <div class="auth-box profile-card">
            <span class="close-btn" onclick="closeModal('profile-modal')">&times;</span>
            <img id="p-avatar" src="" alt="avatar">
            <h2 id="p-name"></h2>
            <p id="p-username"></p>
            <p id="p-bio-text" style="font-size: 0.9em; color: #ccc; margin: 10px 0;"></p>
            <textarea id="p-bio-edit" style="display:none;"></textarea>
            
            <div id="profile-actions">
                </div>
        </div>
    </div>

    <div id="channel-modal" class="modal" style="display: none;">
        <div class="auth-box">
            <span class="close-btn" onclick="closeModal('channel-modal')">&times;</span>
            <h3>Создать канал</h3>
            <input type="text" id="chan-name" placeholder="Название канала...">
            <input type="text" id="chan-link" placeholder="Юзернейм канала (напр. news)...">
            <button onclick="createChannel()">Создать</button>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="profile-header" onclick="openMyProfile()">
                    <img id="user-avatar" src="" alt="ava">
                    <div class="user-info">
                        <strong id="display-name"></strong>
                        <div class="status-online">Online</div>
                    </div>
                </div>
                <div class="settings-icon" onclick="openChannelCreator()">⚙️</div>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchUser" placeholder="Поиск @юзернейм...">
                <button onclick="searchProfile()">🔍</button>
            </div>

            <div id="chat-list" class="chat-list"></div>
        </aside>

        <main class="main-chat">
            <div class="chat-header">
                <h3 id="current-chat-title">Выберите чат</h3>
            </div>
            <div id="messages" class="messages"></div>
            <div class="input-panel" id="inputPanel" style="display: none;">
                <input type="text" id="msgInput" placeholder="Сообщение...">
                <button onclick="send()">➤</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
