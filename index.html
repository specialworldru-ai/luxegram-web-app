<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeGram</title>
    <link rel="stylesheet" href="style.css">
    <!-- Иконки (по желанию) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="menu-icon">☰</div>
                <input type="text" placeholder="Поиск" class="search-input">
            </header>
            <div class="chats-list" id="chatsList">
                <div class="chat-item active">
                    <div class="avatar">L</div>
                    <div class="chat-info">
                        <div class="chat-name">LuxeGram Support</div>
                        <div class="last-message">Добро пожаловать в LuxeGram!</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Окно чата -->
        <main class="main-chat">
            <header class="chat-header">
                <div class="chat-title-container">
                    <div class="chat-name">LuxeGram Support</div>
                    <div class="chat-status">в сети</div>
                </div>
                <div class="header-icons">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="message incoming">
                    <div class="message-content">
                        Привет! Это твоя копия Telegram — LuxeGram. Начинай писать код!
                        <span class="message-time">20:41</span>
                    </div>
                </div>
            </div>

            <footer class="chat-input-area">
                <i class="fa-regular fa-paperclip"></i>
                <input type="text" id="messageInput" placeholder="Напишите сообщение..." autocomplete="off">
                <i class="fa-regular fa-face-smile"></i>
                <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
            </footer>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
