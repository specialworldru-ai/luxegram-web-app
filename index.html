<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxegram Purple</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Экран регистрации (скрывается после входа) -->
    <div id="auth-screen" class="modal">
        <div class="auth-box">
            <h2>Добро пожаловать</h2>
            <input type="text" id="reg-name" placeholder="Введите ваш ник...">
            <button onclick="register()">Войти в чат</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="profile-section">
                <img id="user-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=User" alt="avatar">
                <span id="display-name">User</span>
            </div>
            <div class="chat-list">
                <div class="chat-item active" onclick="switchChat('Общий чат')">🟣 Общий чат</div>
                <div class="chat-item" onclick="switchChat('Архив')">📦 Архив</div>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <h3 id="current-chat-title">Общий чат</h3>
            </div>
            <div id="messages" class="messages"></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Напишите сообщение...">
                <button onclick="send()">➤</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
