<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxegram Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal">
        <div class="auth-box">
            <h2>Luxegram</h2>
            <input type="text" id="reg-name" placeholder="Ваш ник...">
            <button onclick="register()">Войти</button>
        </div>
    </div>

    <div id="profile-modal" class="modal" style="display: none;">
        <div class="auth-box profile-card">
            <span class="close-btn" onclick="closeProfile()">&times;</span>
            <img id="p-avatar" src="" alt="avatar">
            <h2 id="p-name"></h2>
            <p id="p-username"></p>
            <textarea id="p-bio" placeholder="Расскажите о себе..."></textarea>
            <button onclick="saveProfile()">Сохранить</button>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="profile-header" onclick="openProfile()" style="cursor: pointer;">
                <img id="user-avatar" src="" alt="ava">
                <div class="user-info">
                    <strong id="display-name"></strong>
                    <div class="status-online">Online</div>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchUser" placeholder="Ник собеседника...">
                <button onclick="addContact()">+</button>
            </div>

            <div id="chat-list" class="chat-list">
                </div>
        </aside>

        <main class="main-chat">
            <div class="chat-header">
                <h3 id="current-chat-title">Выберите чат</h3>
            </div>
            <div id="messages" class="messages"></div>
            <div class="input-panel" id="inputPanel" style="display: none;">
                <input type="text" id="msgInput" placeholder="Сообщение...">
                <button onclick="send()">➤</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
