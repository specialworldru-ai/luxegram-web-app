<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeGram — Full Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Левое меню -->
        <div id="sideMenu" class="side-menu">
            <div class="menu-content">
                <div class="menu-header">
                    <div class="avatar">L</div>
                    <div class="menu-user-info">LuxeGram User</div>
                </div>
                <div class="menu-item" id="themeToggle"><i class="fa-solid fa-moon"></i> Ночной режим</div>
                <div class="menu-item"><i class="fa-solid fa-user"></i> Контакты</div>
                <div class="menu-item"><i class="fa-solid fa-gear"></i> Настройки</div>
            </div>
        </div>

        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="menu-icon" id="openMenuBtn">
                    <i class="fa-solid fa-bars"></i>
                </div>
                <input type="text" id="searchInput" placeholder="Поиск" class="search-input">
            </header>
            <div class="chats-list" id="chatsList">
                <div class="chat-item active" data-name="LuxeGram Support">
                    <div class="avatar">LS</div>
                    <div class="chat-info">
                        <div class="chat-name">LuxeGram Support</div>
                        <div class="last-message">Добро пожаловать в мессенджер!</div>
                    </div>
                </div>
                <div class="chat-item" data-name="Павел Дуров">
                    <div class="avatar" style="background: #e67e22;">ПД</div>
                    <div class="chat-info">
                        <div class="chat-name">Павел Дуров</div>
                        <div class="last-message">Стена еще не вернулась?</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <div class="chat-title-container">
                    <div class="chat-name" id="currentChatName">LuxeGram Support</div>
                    <div class="chat-status">в сети</div>
                </div>
                <div class="header-icons">
                    <i class="fa-solid fa-magnifying-glass action-icon" id="searchInChat"></i>
                    <i class="fa-solid fa-ellipsis-vertical action-icon" id="chatOptions"></i>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="message incoming">
                    <div class="message-content">
                        Привет! Теперь тут всё работает: меню слева, поиск по чатам и эмодзи.
                        <span class="message-time">20:41</span>
                    </div>
                </div>
            </div>

            <!-- Панель эмодзи -->
            <div id="emojiPicker" class="emoji-picker hidden">
                <span>😊</span><span>😂</span><span>😍</span><span>🔥</span><span>👍</span><span>❤️</span><span>😎</span><span>👋</span>
            </div>

            <footer class="chat-input-area">
                <button class="icon-btn" id="attachBtn"><i class="fa-regular fa-paperclip"></i></button>
                <input type="text" id="messageInput" placeholder="Напишите сообщение..." autocomplete="off">
                <button class="icon-btn" id="emojiBtn"><i class="fa-regular fa-face-smile"></i></button>
                <button id="sendBtn" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </footer>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
