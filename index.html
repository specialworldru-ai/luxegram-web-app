<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeGram</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-card">
            <h1>LuxeGram</h1>
            <input type="text" id="reg-name" placeholder="Введите ваш ник...">
            <button onclick="register()">Войти</button>
        </div>
    </div>

    <div class="app-container">
        <div id="side-menu" class="side-menu">
            <div class="menu-header">
                <img id="menu-avatar" class="large-avatar" src="">
                <div id="menu-user-name" class="menu-username"></div>
            </div>
            <div class="menu-content">
                <div class="menu-item" onclick="selectChat('Заметки')">🔖 Saved Messages</div>
                <div class="menu-item">📁 Archived Chats <span class="badge">241</span></div>
                <div class="menu-item">⏳ My Stories</div>
                <hr>
                <div class="menu-item">👛 Wallet</div>
                <div class="menu-item">⚙️ Settings</div>
            </div>
        </div>
        <div id="menu-overlay" onclick="toggleMenu()"></div>

        <div class="sidebar">
            <div class="sidebar-header">
                <div class="menu-toggle" onclick="toggleMenu()">☰</div>
                <input type="text" id="searchUser" placeholder="Поиск..." onkeydown="if(event.key==='Enter') searchProfile()">
            </div>
            <div id="chat-list" class="chat-list"></div>
        </div>

        <div class="chat-window">
            <div class="chat-header">
                <h3 id="current-chat-title">Выберите чат</h3>
            </div>
            <div id="messages" class="messages-area"></div>
            <div class="input-area" id="inputPanel" style="display: none;">
                <input type="text" id="msgInput" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter') send()">
                <button onclick="send()">➤</button>
            </div>
        </div>
    </div>

    <div id="msg-menu" class="context-menu">
        <div class="menu-item" onclick="editMsg()">✏️ Изменить</div>
        <div class="menu-item delete" onclick="deleteMsg()">🗑️ Удалить</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
