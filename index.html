<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeGram</title>
    <!-- Подключаем иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Подключаем стили (убедись, что файл style.css лежит в той же папке) -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme"> <!-- Сразу включаем темную тему, чтобы не было белого экрана -->
    <audio id="notifySound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>

    <div class="app-container">
        <!-- Боковое меню -->
        <div id="sideMenu" class="side-menu">
            <div class="menu-header-dark" id="openProfileTrigger">
                <div class="avatar">L</div>
                <div class="menu-user-info">
                    <div class="user-name">LuxeGram User</div>
                    <div class="user-phone">+7 999 000-00-00</div>
                </div>
            </div>
            <div class="menu-body">
                <div class="menu-item" id="themeToggle"><i class="fa-solid fa-moon"></i> Ночной режим</div>
                <div class="menu-item"><i class="fa-solid fa-user-group"></i> Создать группу</div>
                <div class="menu-item"><i class="fa-solid fa-bullhorn"></i> Создать канал</div>
                <div class="menu-item"><i class="fa-solid fa-bookmark"></i> Избранное</div>
                <div class="menu-item"><i class="fa-solid fa-gear"></i> Настройки</div>
            </div>
        </div>

        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="menu-icon" id="openMenuBtn"><i class="fa-solid fa-bars"></i></div>
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Поиск" class="search-input">
                </div>
            </header>
            <div class="chats-list">
                <div class="chat-item active" data-id="support" data-name="LuxeGram Support">
                    <div class="avatar">LS</div>
                    <div class="chat-info">
                        <div class="chat-name">LuxeGram Support</div>
                        <div class="last-message">Стили восстановлены!</div>
                    </div>
                </div>
                <div class="chat-item" data-id="main_chat" data-name="Общий чат">
                    <div class="avatar" style="background: #8e44ad;">ОЧ</div>
                    <div class="chat-info">
                        <div class="chat-name">Общий чат</div>
                        <div class="last-message">Тут все юзеры</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <div class="chat-name" id="currentChatName">LuxeGram Support</div>
                <div class="header-icons">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </header>
            <div class="messages-container" id="messagesContainer"></div>
            
            <div id="emojiPicker" class="emoji-picker hidden">
                <span>😊</span><span>😂</span><span>🔥</span><span>👍</span><span>❤️</span><span>😎</span>
            </div>

            <footer class="chat-input-area">
                <button class="icon-btn"><i class="fa-regular fa-paperclip"></i></button>
                <input type="text" id="messageInput" placeholder="Напишите сообщение...">
                <button class="icon-btn" id="emojiBtn"><i class="fa-regular fa-face-smile"></i></button>
                <button id="sendBtn" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </footer>
        </main>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
