<div class="tg-app">
    <!-- Левая панель: всегда видна -->
    <aside class="tg-left-column">
        <div class="tg-search-area">
            <div onclick="toggleSidebar()" style="cursor:pointer; font-size:20px;">☰</div>
            <div class="search-input-wrapper">
                <input type="text" id="userSearch" placeholder="Поиск">
            </div>
        </div>
        <div class="tg-chats-list" id="chat-list">
            <!-- Сюда script.js подставит чаты -->
        </div>
    </aside>

    <!-- Правая панель: окно чата -->
    <main class="tg-main-column">
        <div id="active-chat-window" style="display:none; flex-direction:column; height:100%;">
            <header class="tg-chat-header" style="padding:10px 20px; background:var(--tg-side);">
                <span id="chat-title" style="font-weight:bold;"></span>
            </header>
            <div id="messages" class="tg-messages-container"></div>
            <footer class="tg-input-area" style="padding:15px; background:var(--tg-side);">
                <input type="text" id="msgInput" placeholder="Сообщение..." style="width:85%; padding:10px; border-radius:10px; background:var(--tg-bg); color:#fff; border:none;">
                <button onclick="send()" style="width:10%; padding:10px; background:var(--tg-accent); border:none; color:#fff; border-radius:10px;">➤</button>
            </footer>
        </div>
    </main>
</div>

<!-- Выезжающее меню настроек -->
<div id="main-sidebar" class="tg-sidebar">
    <h3 id="my-nick">Имя</h3>
    <p id="my-user" style="opacity:0.6;"></p>
    <hr style="margin:15px 0; opacity:0.1;">
    <div onclick="toggleTheme()" style="cursor:pointer; margin-bottom:10px;">🌓 Сменить тему</div>
    <div onclick="openSettings()" style="cursor:pointer;">⚙️ Настройки</div>
</div>
