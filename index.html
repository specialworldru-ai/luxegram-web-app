<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxegram Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="modal">
        <div class="auth-box">
            <h2>Luxegram Purple</h2>
            <input type="text" id="reg-name" placeholder="Придумайте ник...">
            <button onclick="register()">Создать профиль</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="profile-header">
                <img id="user-avatar" src="" alt="ava">
                <div class="user-info">
                    <strong id="display-name"></strong>
                    <small>Online</small>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchUser" placeholder="Поиск по юзернейму...">
                <button onclick="addContact()">+</button>
            </div>

            <div id="chat-list" class="chat-list">
                <!-- Сюда будут добавляться чаты -->
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <h3 id="current-chat-title">Выберите чат</h3>
            </div>
            <div id="messages" class="messages"></div>
            <div class="input-area" id="inputPanel" style="display: none;">
                <input type="text" id="msgInput" placeholder="Напишите сообщение...">
                <button onclick="send()">➤</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
