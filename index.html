<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeGram — Telegram Style</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="tg-theme">

    <!-- Авторизация -->
    <div id="auth-screen" class="auth-overlay">
        <div class="auth-modal">
            <div class="tg-logo"></div>
            <h1>LuxeGram</h1>
            <p>Введите данные для входа</p>
            <input type="text" id="reg-nickname" placeholder="Имя">
            <input type="text" id="reg-username" placeholder="@username">
            <button onclick="register()">Начать общение</button>
        </div>
    </div>

    <div class="tg-app">
        <!-- Левая часть: Список чатов -->
        <aside class="tg-left-column">
            <div class="tg-search-area">
                <div class="menu-btn" onclick="toggleSidebar()">☰</div>
                <div class="search-input-wrapper">
                    <input type="text" id="userSearch" placeholder="Поиск" onkeydown="if(event.key==='Enter') searchProfile()">
                </div>
            </div>
            
            <div class="tg-chats-list" id="chat-list">
                <!-- Сюда рендерятся чаты -->
            </div>
        </aside>

        <!-- Правая часть: Окно чата -->
        <main class="tg-main-column">
            <div id="empty-state" class="empty-chat">
                <div class="empty-label">Выберите, кому хотели бы написать</div>
            </div>

            <div id="active-chat-window" style="display: none;">
                <header class="tg-chat-header" onclick="showUserProfile(activeChat)">
                    <div class="header-avatar" id="header-avatar"></div>
                    <div class="header-info">
                        <div class="header-name" id="chat-title">Чат</div>
                        <div class="header-status" id="chat-status">в сети</div>
                    </div>
                </header>

                <div class="tg-messages-container" id="messages">
                    <!-- Сообщения -->
                </div>

                <footer class="tg-input-area">
                    <div class="input-wrapper">
                        <input type="text" id="msgInput" placeholder="Сообщение" onkeydown="if(event.key==='Enter') send()">
                        <button class="send-btn" onclick="send()">➤</button>
                    </div>
                </footer>
            </div>
        </main>
    </div>

    <!-- Боковое меню настроек -->
    <div id="main-sidebar" class="tg-sidebar">
        <div class="sidebar-header">
            <div class="user-avatar" id="my-avatar"></div>
            <div class="user-info">
                <div id="my-nick">Имя</div>
                <div id="my-user">@username</div>
            </div>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-item" onclick="toggleTheme()">🌓 Сменить тему</div>
            <div class="sidebar-item" onclick="openSettings()">⚙️ Настройки</div>
            <div class="sidebar-item" onclick="showFolder('archive')">📦 Архив</div>
        </div>
    </div>
    <div id="overlay" onclick="toggleSidebar()"></div>

    <script src="script.js"></script>
</body>
</html>
